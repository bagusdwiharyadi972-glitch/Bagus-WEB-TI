<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Data Mahasiswa</title>
</head>
<body>
<h2>Form Data Mahasiswa</h2>

<form action="#" method="post">

    <!-- Nama -->
    Nama: <br>
    <input type="text" name="nama"><br><br>

    <!-- NIM -->
    NIM: <br>
    <input type="number" name="nim"><br><br>

    <!-- Password -->
    Password: <br>
    <input type="password" name="password"><br><br>

    <!-- Email -->
    Email: <br>
    <input type="email" name="email"><br><br>

    <!-- No HP -->
    No HP: <br>
    <input type="tel" name="nohp"><br><br>

    <!-- Website -->
    Website Pribadi: <br>
    <input type="url" name="website"><br><br>

    <!-- Tanggal Lahir -->
    Tanggal Lahir: <br>
    <input type="date" name="tgl_lahir"><br><br>

    <!-- Warna Favorit -->
    Warna Favorit: <br>
    <input type="color" name="warna"><br><br>

    <!-- Range -->
    Tingkat Kepuasan: <br>
    <input type="range" name="kepuasan" min="1" max="10"><br><br>

    <!-- Radio -->
    Jenis Kelamin: <br>
    <input type="radio" name="jk" value="Laki-laki"> Laki-laki
    <input type="radio" name="jk" value="Perempuan"> Perempuan
    <br><br>

    <!-- Checkbox -->
    Hobi: <br>
    <input type="checkbox" name="hobi[]" value="Membaca"> Membaca
    <input type="checkbox" name="hobi[]" value="Olahraga"> Olahraga
    <input type="checkbox" name="hobi[]" value="Gaming"> Gaming
    <input type="checkbox" name="hobi[]" value="Musik"> Musik
    <br><br>

    <!-- File -->
    Upload Foto: <br>
    <input type="file" name="foto"><br><br>

    <!-- Textarea -->
    Alamat: <br>
    <textarea name="alamat" rows="4" cols="30"></textarea><br><br>

    <!-- Select -->
    Jurusan: <br>
    <select name="jurusan">
        <option value="IK">Informatika</option>
        <option value="TI">Teknologi Informasi</option>
        <option value="TM">Teknik Mesin</option>
        <option value="TS">Teknik Sipil</option>
        <option value="RE">Rekayasa Elektro</option>
        <option value="AR">Arsitektur</option>
    </select>
    <br><br>

    <!-- Submit -->
    <button type="submit">Submit</button>

</form>

</body>
</html>
